name: Release

# On a v* tag: build, Developer-ID sign, notarize (App Store Connect API key),
# staple, and attach the zip to a GitHub Release.
# On manual dispatch: same build/sign/notarize, but upload the zip as an
# artifact instead of creating a Release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      adium_ref:
        description: Adium git ref for headers
        required: false
        default: master

permissions:
  contents: write   # create the Release / upload assets

env:
  NOTARY_PROFILE: pecan-notary

jobs:
  release:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7

      - name: Set up build dependencies
        uses: ./.github/actions/setup-build-deps
        with:
          adium-ref: ${{ github.event.inputs.adium_ref || 'master' }}

      - name: Stamp bundle version from tag
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" \
                                  -c "Set :CFBundleVersion $VERSION" \
                                  adium-pecan/Info.plist
          echo "Stamped version $VERSION"

      - name: Import Developer ID certificate
        env:
          CERT_B64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.MACOS_CERT_PASSWORD }}
          KC_PW: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KC_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PW" "$KEYCHAIN"
          # Put our keychain first in the search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PW" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Allow codesign to use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PW" "$KEYCHAIN"

          rm -f "$RUNNER_TEMP/cert.p12"
          echo "SIGN_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Register notary credentials (API key)
        env:
          KEY_B64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          ISSUER: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          echo "$KEY_B64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --key "$RUNNER_TEMP/AuthKey.p8" --key-id "$KEY_ID" --issuer "$ISSUER" \
            --keychain "$SIGN_KEYCHAIN"
          rm -f "$RUNNER_TEMP/AuthKey.p8"

      - name: Build + sign + notarize + staple
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
          NOTARY_KEYCHAIN: ${{ env.SIGN_KEYCHAIN }}
        run: adium-pecan/package.sh

      - name: Name the release asset
        id: asset
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            NAME="WLM-Pecan-Adium-${GITHUB_REF_NAME}.zip"
          else
            NAME="WLM-Pecan-Adium-${GITHUB_SHA::7}.zip"
          fi
          cp "adium-pecan/dist/WLM-Pecan-Adium.zip" "$RUNNER_TEMP/$NAME"
          echo "path=$RUNNER_TEMP/$NAME" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.asset.outputs.path }}
          fail_on_unmatched_files: true

      - name: Upload artifact (manual dispatch)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v6  
        with:
          name: ${{ steps.asset.outputs.name }}
          path: ${{ steps.asset.outputs.path }}
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        run: |
          [ -n "${SIGN_KEYCHAIN:-}" ] && security delete-keychain "$SIGN_KEYCHAIN" 2>/dev/null || true
          security list-keychains -d user -s login.keychain-db 2>/dev/null || true
